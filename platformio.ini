; PlatformIO Project Configuration
; Huonyx AI Smartwatch v2.0 - ESP32-2424S012
; Board: ESP32-C3-MINI-1U with GC9A01 240x240 Round Display
; Features: HoC Gateway, Flipper Zero BLE, Supabase Realtime Bridge

[env:esp32c3]
platform = espressif32@6.9.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = partitions.csv
board_build.flash_mode = qio
board_build.f_flash = 80000000L

; ESP32-C3 specific
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM=0
    ; TFT_eSPI configuration
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=7
    -DTFT_SCLK=6
    -DTFT_CS=10
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=3
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    ; LVGL configuration
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_TICK_CUSTOM=1
    -I src
    ; NimBLE configuration (memory-efficient BLE stack)
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=0
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_MAX_BONDS=1
    -DCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=128
    ; Memory optimization
    -Os
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.4.0
    bblanchon/ArduinoJson@^7.2.1
    links2004/WebSockets@^2.6.1
    h2zero/NimBLE-Arduino@^1.4.3

lib_ldf_mode = deep+
