; PlatformIO Configuration — Huonyx Watch M5StickC Plus2 Port
; Board: M5StickC Plus2 (ESP32-PICO-V3-02)
; Framework: Arduino ESP32 3.x

[env:m5stickc-plus2]
platform   = espressif32
board      = m5stick-c
framework  = arduino

; ── Build ──────────────────────────────────────────────
build_flags =
    -DARDUINO_M5STACK_STICKC_PLUS2=1
    -DCORE_DEBUG_LEVEL=0
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=0
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_MAX_BONDS=1
    -DCONFIG_BT_NIMBLE_ATT_PREFERRED_MTU=128
    -Os
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; ── Upload ─────────────────────────────────────────────
upload_speed   = 1500000
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; ── Partition table ────────────────────────────────────
; 8MB flash: 4MB app + 2MB SPIFFS + 2MB NVS
board_build.partitions = default_8MB.csv
board_build.flash_mode = qio
board_build.flash_freq = 80m

; ── Libraries ──────────────────────────────────────────
lib_deps =
    ; M5Stack hardware abstraction
    m5stack/M5GFX @ ^0.2.4
    m5stack/M5Unified @ ^0.2.4

    ; LVGL 9.x UI framework
    lvgl/lvgl @ ^9.2.2

    ; WebSockets for Gateway & Supabase
    links2004/WebSockets @ ^2.4.1

    ; JSON parsing
    bblanchon/ArduinoJson @ ^7.2.1

    ; BLE (NimBLE — much smaller than classic BLE)
    h2zero/NimBLE-Arduino @ ^2.2.3

    ; NVS configuration storage
    ; (built into ESP32 Arduino core — no extra lib needed)

; ── Source filter ──────────────────────────────────────
; Only compile the M5StickC Plus2 variant
build_src_filter =
    +<HuonyxWatch_M5StickCPlus2/**>
    -<HuonyxWatch/**>
    -<ScreenTest/**>
